<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NUSAPOS - Dashboard</title>
  <style>
    :root {
      --warna-utama: #0A2A66; /* Biru Dongker */
      --warna-aksen: #00B4A0; /* Toska */
      --warna-bg: #F0F7F6;
    }
    body { font-family: Arial; background: var(--warna-bg); padding: 20px; margin:0; }
   .header { text-align:center; margin-bottom:20px; }
   .header img { width:80px; height:80px; border-radius:12px; }
    h1 { color: var(--warna-utama); margin:5px 0; }
   .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width:600px; margin:auto; }
   .menu-btn { padding: 25px; background: white; border-radius: 12px; text-align: center;
                font-size: 18px; font-weight: bold; text-decoration: none; color: var(--warna-utama);
                box-shadow: 0 2px 5px rgba(0,0,0,0.1); border: 2px solid var(--warna-aksen); }
   .menu-btn:hover { background: var(--warna-utama); color: white; border-color: var(--warna-utama); }
  </style>
</head>
<body>
  <div class="header">
    <img id="logoToko" src="icon.png">
    <h1>NUSAPOS</h1>
    <p style="color:#666;">Aplikasi POS Universal</p>
  </div>

  <div class="grid" id="menuGrid">
    <!-- Tombol otomatis dari database -->
  </div>

<script>
let db;
const req = indexedDB.open("NusaPOS", 1);
req.onsuccess = e => { db = e.target.result; loadMenu(); loadLogo(); }

// Load tombol menu dari DB
function loadMenu(){
  if(!db.objectStoreNames.contains('menu')) return;
  const tx = db.transaction("menu","readonly");
  tx.objectStore("menu").getAll().onsuccess = e => {
    document.getElementById("menuGrid").innerHTML = e.target.result.map(m =>
      `<a href="${m.link}" class="menu-btn">${m.icon} <br>${m.nama}</a>`
    ).join("");
  }
}

// Load logo dari localStorage
function loadLogo(){
  const logo = localStorage.getItem('logoToko');
  if(logo) document.getElementById('logoToko').src = logo;
}
</script>
</body>
</html>
