<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NUSAPOS - Tambah Barang</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
    .card { background: white; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; }
    input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; }
    button { background: #4CAF50; color: white; border: none; font-weight: bold; }
    button.kasir { background: #2196F3; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Tambah Barang Baru</h2>
    <input type="text" id="nama" placeholder="Nama Barang">
    <input type="number" id="harga" placeholder="Harga">
    <input type="number" id="stok" placeholder="Stok">
    <button onclick="simpanBarang()">SIMPAN BARANG</button>
    <button class="kasir" onclick="keKasir()">KE HALAMAN KASIR</button>
  </div>
  <script src="app.js"></script>
</body>
</html>
