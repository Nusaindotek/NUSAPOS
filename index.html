<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NUSAPOS - Dashboard</title>
  <style>
    body {
      background-color: #0f2d59; /* Navy Blue dari Logo */
      color: #ffffff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .app-container {
      width: 100%;
      max-width: 450px;
      padding: 30px 20px;
      box-sizing: border-box;
      text-align: center;
    }
    .logo-box img {
      width: 100px;
      height: auto;
      margin-bottom: 15px;
    }
    h1 {
      font-size: 28px;
      margin: 5px 0;
      letter-spacing: 1px;
    }
    .tagline {
      color: #17b7be; /* Tosca dari Logo */
      font-size: 14px;
      margin-bottom: 35px;
    }
    .menu-area {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .btn {
      width: 100%;
      padding: 15px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      box-sizing: border-box;
    }
    .btn-kasir {
      background-color: #ffffff;
      color: #0f2d59;
      border: 2px solid #ffffff;
    }
    .btn-aksen {
      background-color: #17b7be; /* Tosca */
      color: #0f2d59;
    }
    .btn-outline {
      background-color: transparent;
      color: #17b7be;
      border: 2px solid #17b7be;
    }
    .btn:active {
      transform: scale(0.98);
    }
    .footer-note {
      margin-top: 40px;
      font-size: 11px;
      color: #7292bf;
    }
  </style>
</head>
<body>

<div class="app-container">
  <!-- Header Logo & Nama Toko Dinamis -->
  <div class="logo-box">
    <img src="icon.png" alt="Logo NUSAPOS">
    <h1 id="displayNamaToko">NUSAPOS</h1>
    <div class="tagline" id="displayModeUsaha">Aplikasi POS Universal</div>
  </div>

  <!-- Area Tombol Menu Maksimal 5 Halaman (Di-render via JavaScript) -->
  <div class="menu-area" id="menuDinamis">
    <p style="color: #7292bf;">Memuat konfigurasi aplikasi...</p>
  </div>

  <div class="footer-note">
    NUSAPOS v1.0 BETA Web Version
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
